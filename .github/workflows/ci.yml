name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Erzwingt den Basis-Image-Digest-Pin (Dockerfile) — Done-Kriterium Phase 7.
  verify-base-pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Assert base image is pinned by @sha256 digest
        run: |
          if ! grep -Eq '^FROM[[:space:]]+[^[:space:]]+@sha256:[0-9a-f]{64}' Dockerfile; then
            echo "::error file=Dockerfile::FROM muss per @sha256-Digest gepinnt sein"
            exit 1
          fi
          echo "Digest-Pin OK:"; grep -E '^FROM' Dockerfile

  build-scan:
    needs: verify-base-pin
    runs-on: ubuntu-latest
    permissions:
      contents: write         # GitHub-Release bei Tag-Push
      packages: write         # GHCR-Push (main + Version-Tags)
      security-events: write  # SARIF-Upload in den Security-Tab (public Repo)
    env:
      IMAGE: ghcr.io/${{ github.repository }}   # metadata-action lowercased automatisch
      SCAN_TAG: localbuild/arkserver:scan
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          # :X.Y.Z + :X.Y bei Version-Tags, :latest folgt via Default-flavor den Releases;
          # :edge = Spitze von main; :sha-<short> je Commit.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            type=sha,format=short

      # Bauen + lokal laden (load) fuer den Scan; noch KEIN Push.
      - name: Build image (load for scan)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.SCAN_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 1) Report (immer gruen) -> SARIF fuer den Security-Tab (public Repo).
      - name: Trivy scan (SARIF report)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.SCAN_TAG }}
          scan-type: image
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif

      # 2) Gate — Table ins Log + bei CRITICAL rot (unfixed CVEs ignoriert).
      - name: Trivy gate (fail on CRITICAL)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.SCAN_TAG }}
          scan-type: image
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      # 3) Nur bei Push-Event (main-Branch oder Version-Tag), nach gruenem Gate: nach GHCR pushen.
      #    Cache-Hit -> praktisch nur Push, kein Rebuild. PRs pushen nicht.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4) Bei Version-Tag (vX.Y.Z): GitHub-Release mit auto-generierten Notes.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
